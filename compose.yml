services:
  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-storeowners}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-storeowners}?schema=public
      API_HOST: 0.0.0.0
      API_PORT: 3000
      TRUST_PROXY: all
      STORE_FILES_DIR: /data/store-files
      # DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET, DISCORD_OAUTH_REDIRECT_URI,
      # ADMIN_DISCORD_IDS, SESSION_SECRET, PUBLIC_BASE_URL, BOT_NOTIFY_URL,
      # BOT_NOTIFY_SECRET, MAX_UPLOAD_BYTES and COOKIE_SECURE come from .env.
    volumes:
      - store_files:/data
    extra_hosts:
      # Lets BOT_NOTIFY_URL reach a bot running on the host (host.docker.internal).
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok){process.exit(1)}}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storeowners}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-storeowners}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storeowners} -d ${POSTGRES_DB:-storeowners}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  store_files:
